<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <style>
    body {
      margin: 0;
      padding: 16px;
      font: 13px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #172033;
      background: #f6f8fb;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 16px;
    }
    .status {
      padding: 10px 12px;
      border: 1px solid #d8e0ec;
      border-radius: 8px;
      background: #fff;
    }
    .status strong {
      display: block;
      margin-bottom: 4px;
    }
    .ok { color: #0b7a45; }
    .bad { color: #a13422; }
    .muted {
      margin-top: 10px;
      color: #64748b;
      word-break: break-word;
    }
    button {
      margin-top: 12px;
      width: 100%;
      height: 34px;
      border: 1px solid #2f6feb;
      border-radius: 6px;
      background: #2f6feb;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>美术工作台 Figma 桥接</h1>
  <div class="status">
    <strong id="state" class="bad">正在连接本机桥接服务...</strong>
    <div id="detail">请确认工作台 Figma 桥接服务已启动。</div>
  </div>
  <button id="test">创建测试文本</button>
  <div class="muted" id="meta"></div>

  <script>
    const bridgeBase = 'http://127.0.0.1:9530';
    const stateEl = document.getElementById('state');
    const detailEl = document.getElementById('detail');
    const metaEl = document.getElementById('meta');
    const testButton = document.getElementById('test');
    let pluginStatus = {};
    let pendingTask = null;

    window.onmessage = async (event) => {
      const message = event.data && event.data.pluginMessage;
      if (!message) return;
      if (message.type === 'plugin-status') {
        pluginStatus = message;
        renderStatus('插件已打开，正在等待工作台任务。', true);
      }
      if (message.type === 'bridge-task-result') {
        await postResult(message);
        pendingTask = null;
      }
    };

    testButton.onclick = async () => {
      try {
        testButton.disabled = true;
        await fetch(`${bridgeBase}/test/create-text?waitMs=1000`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text: 'mcp_test_figma_bridge' })
        });
        renderStatus('测试任务已发送，请等待画布出现文本。', true);
      } catch (error) {
        renderStatus(`测试任务发送失败：${error.message || error}`, false);
      } finally {
        testButton.disabled = false;
      }
    };

    parent.postMessage({ pluginMessage: { type: 'plugin-status' } }, '*');
    setInterval(pollTask, 1200);
    pollTask();

    async function pollTask() {
      if (pendingTask) return;
      try {
        const query = new URLSearchParams({
          fileKey: pluginStatus.fileKey || '',
          fileName: pluginStatus.fileName || '',
          pageName: pluginStatus.pageName || '',
          version: pluginStatus.pluginVersion || '2026-07-09-minimal'
        });
        const response = await fetch(`${bridgeBase}/plugin/next?${query.toString()}`);
        const data = await response.json();
        renderStatus('已连接本机桥接服务，等待工作台任务。', true);
        if (data.task) {
          pendingTask = data.task;
          renderStatus(`正在执行任务：${data.task.type}`, true);
          parent.postMessage({ pluginMessage: { type: 'bridge-task', task: data.task } }, '*');
        }
      } catch (error) {
        renderStatus(`未连接本机桥接服务：${error.message || error}`, false);
      }
    }

    async function postResult(result) {
      await fetch(`${bridgeBase}/plugin/result`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(result)
      });
      renderStatus(result.ok ? '任务已完成并回传。' : `任务失败：${result.error || '未知错误'}`, result.ok);
    }

    function renderStatus(text, ok) {
      stateEl.textContent = ok ? '桥接在线' : '桥接未就绪';
      stateEl.className = ok ? 'ok' : 'bad';
      detailEl.textContent = text;
      metaEl.textContent = [
        pluginStatus.fileName ? `文件：${pluginStatus.fileName}` : '',
        pluginStatus.pageName ? `页面：${pluginStatus.pageName}` : ''
      ].filter(Boolean).join(' / ');
    }
  </script>
</body>
</html>
