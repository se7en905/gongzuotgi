<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <style>
    body {
      margin: 0;
      padding: 16px;
      font: 13px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #172033;
      background: #f6f8fb;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 16px;
    }
    .status {
      padding: 10px 12px;
      border: 1px solid #d8e0ec;
      border-radius: 8px;
      background: #fff;
    }
    .status strong {
      display: block;
      margin-bottom: 4px;
    }
    .ok { color: #0b7a45; }
    .bad { color: #a13422; }
    .muted {
      margin-top: 10px;
      color: #64748b;
      word-break: break-word;
    }
    button {
      margin-top: 12px;
      width: 100%;
      height: 34px;
      border: 1px solid #2f6feb;
      border-radius: 6px;
      background: #2f6feb;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }
    button.secondary {
      background: #fff;
      color: #2f6feb;
    }
  </style>
</head>
<body>
  <h1>美术工作台 Figma 插件</h1>
  <div class="status">
    <strong id="state" class="bad">正在连接工作台...</strong>
    <div id="detail">插件会自动连接下载它的工作台。</div>
  </div>
  <button id="test">创建测试文本</button>
  <button id="refresh" class="secondary">重新连接工作台</button>
  <div class="muted" id="meta"></div>

  <script>
    const platformBases = __ART_PLATFORM_BASES__;
    const pluginBinding = __ART_PLUGIN_BINDING__;
    const stateEl = document.getElementById('state');
    const detailEl = document.getElementById('detail');
    const metaEl = document.getElementById('meta');
    const testButton = document.getElementById('test');
    const refreshButton = document.getElementById('refresh');
    let pluginStatus = {};
    let connectedBase = platformBases[0] || '';

    window.onmessage = async (event) => {
      const message = event.data && event.data.pluginMessage;
      if (!message) return;
      if (message.type === 'plugin-status') {
        pluginStatus = message;
        heartbeat();
      }
      if (message.type === 'test-result') {
        pluginStatus = message;
        heartbeat(message);
        if (!message.ok) renderStatus(`测试失败：${message.error || '未知错误'}`, false);
      }
      if (message.type === 'heartbeat-result') {
        if (message.ok === true) {
          connectedBase = message.base || connectedBase;
          renderStatus(message.fallback ? '已连接工作台（兼容模式）。保持插件窗口打开即可接入后续任务。' : '已连接工作台。保持插件窗口打开即可接入后续任务。', true);
        } else {
          renderStatus(`连接工作台失败：${message.error || '所有工作台地址都不可访问'}`, false);
        }
      }
    };

    testButton.onclick = () => {
      parent.postMessage({ pluginMessage: { type: 'create-test-text' } }, '*');
    };
    refreshButton.onclick = () => {
      parent.postMessage({ pluginMessage: { type: 'plugin-status' } }, '*');
    };

    parent.postMessage({ pluginMessage: { type: 'plugin-status' } }, '*');
    setInterval(() => parent.postMessage({ pluginMessage: { type: 'plugin-status' } }, '*'), 5000);

    function heartbeat(extra = {}) {
      const payload = {
        fileKey: pluginStatus.fileKey || '',
        fileName: pluginStatus.fileName || '',
        pageName: pluginStatus.pageName || '',
        pluginVersion: pluginStatus.pluginVersion || '2026-07-09-direct-workbench',
        bindingToken: pluginBinding.token || '',
        boundUserId: pluginBinding.userId || '',
        boundUsername: pluginBinding.username || '',
        boundDisplayName: pluginBinding.displayName || '',
        createdNodeIds: extra.createdNodeIds || [],
        mutatedNodeIds: extra.mutatedNodeIds || [],
        ok: extra.ok === true,
        error: extra.error || ''
      };
      parent.postMessage({ pluginMessage: { type: 'heartbeat', payload } }, '*');
    }

    function renderStatus(text, ok) {
      stateEl.textContent = ok ? '工作台已连接' : '工作台未连接';
      stateEl.className = ok ? 'ok' : 'bad';
      detailEl.textContent = text;
      metaEl.textContent = [
        pluginBinding.displayName || pluginBinding.username ? `绑定账号：${pluginBinding.displayName || pluginBinding.username}` : '',
        `工作台：${connectedBase || platformBases.join(' / ')}`,
        pluginStatus.fileName ? `文件：${pluginStatus.fileName}` : '',
        pluginStatus.pageName ? `页面：${pluginStatus.pageName}` : ''
      ].filter(Boolean).join(' / ');
    }
  </script>
</body>
</html>
